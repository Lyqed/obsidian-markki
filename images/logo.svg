      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a4a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="480" height="120" rx="12" fill="url(#bg)"/>
