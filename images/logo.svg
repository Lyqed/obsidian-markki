  <!-- Name -->
  <text x="64" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#f0e6ff" letter-spacing="-1">markki</text>
  <!-- Tagline -->
  <text x="64" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#9d7dd4" letter-spacing="0.5">bullet points → anki cards, via AI</text>
